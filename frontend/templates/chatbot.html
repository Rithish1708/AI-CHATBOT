<!DOCTYPE html>
<html>

<head>

<title>Enterprise AI Assistant</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h2>Enterprise AI Chatbot</h2>

<div id="chatbox"></div>

<input id="message" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<br><br>

<input type="file" id="fileUpload">
<button onclick="uploadFile()">Upload Document</button>

<script>

async function sendMessage(){

let message = document.getElementById("message").value

let chatbox = document.getElementById("chatbox")

chatbox.innerHTML += "<p class='user'>You: "+message+"</p>"

let response = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({message:message})

})

let data = await response.json()

chatbox.innerHTML += "<p class='bot'>Bot: "+data.reply+"</p>"

document.getElementById("message").value=""

}


async function uploadFile(){

let file = document.getElementById("fileUpload").files[0]

let formData = new FormData()

formData.append("file",file)

let response = await fetch("/upload",{

method:"POST",

body:formData

})

let data = await response.json()

let chatbox = document.getElementById("chatbox")

chatbox.innerHTML += "<p class='bot'>Document Summary: "+data.summary+"</p>"

}

</script>

</body>
</html>
